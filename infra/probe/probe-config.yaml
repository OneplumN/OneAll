# 探针配置文件 (Docker 版本)
# 注意: 部分配置可通过环境变量覆盖

# ========== 必填配置 ==========
# 后端 API 地址
api_base_url: "http://backend:8000"

# 探针 ID（可留空；留空时会自动注册，也可通过 PROBE_NODE_ID 环境变量覆盖）
node_id: ""

# 探针 Token（可留空；留空时会自动注册，也可通过 PROBE_API_TOKEN 环境变量覆盖）
api_token: ""

# 可选引导 Token（后端配置 PROBE_BOOTSTRAP_TOKEN 时，可通过 PROBE_BOOTSTRAP_TOKEN 环境变量覆盖）
bootstrap_token: ""

# gRPC 网关地址
grpc_gateway: "grpc-gateway:50051"

# ========== 网络配置 ==========
# Docker 内部通信使用非 TLS
grpc_insecure: true

# ========== 性能配置 ==========
heartbeat_interval: 30
task_poll_interval: 15
request_timeout: 10
max_concurrent_tasks: 4
task_retry_limit: 2

# ========== 存储配置 ==========
result_cache_path: "/var/lib/oneall-probe/cache/results.json"
result_cache_limit: 200
schedule_store_path: "/var/lib/oneall-probe/state/schedules.json"
update_dir: ""

# ========== 监控配置 ==========
metrics_addr: ":9100"
