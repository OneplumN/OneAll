openapi: 3.0.3
info:
  title: OneAll Platform API
  version: 0.1.0
  description: |
    REST API for OneAll 智能运维平台，覆盖探针、拨测、审批、资产、工具库、告警与系统设置能力。
servers:
  - url: https://api.oneall.internal/v1
    description: Production
  - url: https://staging-api.oneall.internal/v1
    description: Staging
tags:
  - name: Auth
  - name: Probe
  - name: Detection
  - name: Dashboard
  - name: Monitoring
  - name: Assets
  - name: Tools
  - name: Settings
  - name: Audit
paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: 用户登录并获取访问令牌
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: 凭据无效

  /probes/nodes/:
    get:
      tags: [Probe]
      summary: 列出探针节点
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [online, offline, maintenance]
        - in: query
          name: region
          schema:
            type: string
      responses:
        '200':
          description: 节点列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProbeNode'
    post:
      tags: [Probe]
      summary: 注册新探针节点
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProbeNodeCreate'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProbeNode'

  /detection/one-off:
    post:
      tags: [Detection]
      summary: 发起一次性拨测
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OneOffDetectionRequest'
      responses:
        '202':
          description: 拨测已调度
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectionTask'

  /detection/tasks/{id}:
    get:
      tags: [Detection]
      summary: 查询拨测任务详情
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: 拨测详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectionTask'

  /dashboard/overview/:
    get:
      tags: [Dashboard]
      summary: 获取概览指标
      responses:
        '200':
          description: 概览指标
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardOverview'

  /dashboard/alerts-summary/:
    get:
      tags: [Dashboard]
      summary: 获取近期告警摘要
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 20
          description: 返回的告警条目数量（默认 5）
      responses:
        '200':
          description: 告警摘要
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardAlertSummary'

  /dashboard/todos/:
    get:
      tags: [Dashboard]
      summary: 获取待办事项列表
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 20
          description: 每个类别返回的待办条目数量（默认 5）
      responses:
        '200':
          description: 待办事项汇总
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardTodoSummary'

  /dashboard/detection-grid/:
    get:
      tags: [Dashboard]
      summary: 获取域名拨测蜂窝图数据
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
          description: 返回的任务数量（默认 50）
      responses:
        '200':
          description: 拨测任务状态列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DashboardDetectionGridItem'

  /dashboard/certificate-alerts/:
    get:
      tags: [Dashboard]
      summary: 获取证书有效期告警
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
          description: 返回的证书条目数量（默认 12）
      responses:
        '200':
          description: 证书告警摘要
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardCertificateAlerts'

  /settings/system:
    get:
      tags: [Settings]
      summary: 获取系统设置
      responses:
        '200':
          description: 当前系统设置
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemSettings'
    put:
      tags: [Settings]
      summary: 更新系统设置
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemSettingsUpdate'
      responses:
        '200':
          description: 更新后的系统设置
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemSettings'
        '204':
          description: 更新成功，无额外内容

  /monitoring/requests:
    get:
      tags: [Monitoring]
      summary: 查询拨测申请列表
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, approved, rejected, cancelled]
        - in: query
          name: domain
          schema:
            type: string
      responses:
        '200':
          description: 申请列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MonitoringRequest'
    post:
      tags: [Monitoring]
      summary: 创建拨测申请（平台内审批）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MonitoringRequestCreate'
      responses:
        '201':
          description: 申请已提交
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitoringRequest'

  /monitoring/requests/{id}:
    get:
      tags: [Monitoring]
      summary: 获取拨测申请详情
      parameters:
        - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          description: 申请详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitoringRequest'
    patch:
      tags: [Monitoring]
      summary: 修改拨测申请（仅驳回后允许）
      parameters:
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MonitoringRequestUpdate'
      responses:
        '200':
          description: 修改成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitoringRequest'

  /audit/logs:
    get:
      tags: [Audit]
      summary: 查询操作与访问日志
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
          description: 页码，默认 1
        - in: query
          name: page_size
          schema:
            type: integer
            minimum: 1
            maximum: 100
          description: 每页条数，默认 20
        - in: query
          name: actor
          schema:
            type: string
            format: uuid
          description: 过滤指定操作者
        - in: query
          name: action
          schema:
            type: string
          description: 模糊匹配操作名称
        - in: query
          name: target_type
          schema:
            type: string
          description: 过滤目标类型
        - in: query
          name: start
          schema:
            type: string
            format: date-time
          description: 开始时间（ISO8601）
        - in: query
          name: end
          schema:
            type: string
            format: date-time
          description: 结束时间（ISO8601）
      responses:
        '200':
          description: 操作日志分页结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogListResponse'

  /monitoring/requests/{id}/approve:
    post:
      tags: [Monitoring]
      summary: 审批通过（系统管理员）
      parameters:
        - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          description: 已通过并创建调度
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitoringRequest'

  /monitoring/requests/{id}/reject:
    post:
      tags: [Monitoring]
      summary: 审批驳回（系统管理员）
      parameters:
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: 驳回原因
      responses:
        '200':
          description: 已驳回
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitoringRequest'

  /monitoring/requests/{id}/resubmit:
    post:
      tags: [Monitoring]
      summary: 重新提交已驳回的申请
      parameters:
        - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          description: 已重新提交，等待审批
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitoringRequest'

  /monitoring/tasks/history:
    get:
      tags: [Monitoring]
      summary: 查询拨测历史记录
      parameters:
        - in: query
          name: target
          schema:
            type: string
          description: 目标域名或关键字模糊匹配
        - in: query
          name: status
          schema:
            type: string
            enum: [scheduled, running, succeeded, failed, timeout]
          description: 拨测任务状态
        - in: query
          name: protocol
          schema:
            type: string
            enum: [HTTP, HTTPS, Telnet, WSS, TCP, CERTIFICATE]
          description: 拨测协议过滤
        - in: query
          name: probe_id
          schema:
            type: string
            format: uuid
          description: 指定探针节点
        - in: query
          name: started_after
          schema:
            type: string
            format: date-time
          description: 仅包含该时间之后执行的记录
        - in: query
          name: started_before
          schema:
            type: string
            format: date-time
          description: 仅包含该时间之前执行的记录
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: page_size
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: 拨测历史列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitoringHistoryResponse'
        '400':
          description: 参数校验失败

  /assets/records:
    get:
      tags: [Assets]
      summary: 查询资产记录
      parameters:
        - in: query
          name: source
          schema:
            type: string
            enum: [domain, zabbix, ipmp, workorder]
        - in: query
          name: keyword
          schema:
            type: string
      responses:
        '200':
          description: 资产列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AssetRecord'

  /assets/records/{record_id}:
    patch:
      tags: [Assets]
      summary: 更新资产记录（工单纳管主机）
      parameters:
        - in: path
          name: record_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetRecordUpdateRequest'
      responses:
        '200':
          description: 更新后的资产记录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetRecord'

  /assets/sync:
    post:
      tags: [Assets]
      summary: 手动触发资产同步
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetSyncRequest'
      responses:
        '200':
          description: 同步已完成（同步模式）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetSyncTriggerResponse'
        '202':
          description: 同步任务已排队
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetSyncTriggerResponse'

  /assets/sync/runs:
    get:
      tags: [Assets]
      summary: 查询资产同步历史
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: mode
          schema:
            type: string
            enum: [sync, async]
      responses:
        '200':
          description: 同步历史列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetSyncRunListResponse'

  /assets/sync/runs/{run_id}:
    get:
      tags: [Assets]
      summary: 查询资产同步详情
      parameters:
        - in: path
          name: run_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: include_changes
          schema:
            type: boolean
            default: false
        - in: query
          name: changes_limit
          schema:
            type: integer
            default: 200
      responses:
        '200':
          description: 同步详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetSyncRunDetailResponse'

  /tools/definitions:
    get:
      tags: [Tools]
      summary: 列出工具定义
      responses:
        '200':
          description: 工具列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ToolDefinition'
    post:
      tags: [Tools]
      summary: 创建工具定义
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToolDefinitionCreate'
      responses:
        '201':
          description: 创建成功

  /tools/definitions/{id}/versions:
    post:
      tags: [Tools]
      summary: 上传脚本版本
      parameters:
        - $ref: '#/components/parameters/ToolId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScriptVersionCreate'
      responses:
        '201':
          description: 新版本已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolDefinition'

  /tools/definitions/{id}/execute:
    post:
      tags: [Tools]
      summary: 触发工具执行
      parameters:
        - $ref: '#/components/parameters/ToolId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToolExecutionRequest'
      responses:
        '202':
          description: 执行已调度

  /tools/executions:
    get:
      tags: [Tools]
      summary: 查询工具执行记录
      responses:
        '200':
          description: 执行记录列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ToolExecution'

  /tools/repository/upload:
    post:
      tags: [Tools]
      summary: 上传脚本新版本
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/ScriptVersionCreate'
                - type: object
                  required: [tool_id]
                  properties:
                    tool_id:
                      type: string
                      format: uuid
      responses:
        '201':
          description: 新版本已上传
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolDefinition'

  /tools/repository/rollback:
    post:
      tags: [Tools]
      summary: 回滚工具到指定版本
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tool_id, version_id]
              properties:
                tool_id:
                  type: string
                  format: uuid
                version_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: 已回滚
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolDefinition'

  /settings/plugins/:
    get:
      tags: [Settings]
      summary: 查询插件配置
      responses:
        '200':
          description: 插件列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PluginConfig'
    post:
      tags: [Settings]
      summary: 创建插件配置
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PluginConfig'
      responses:
        '201':
          description: 创建成功

  /settings/plugins/{id}/:
    get:
      tags: [Settings]
      summary: 获取插件配置详情
      parameters:
        - $ref: '#/components/parameters/PluginId'
      responses:
        '200':
          description: 插件配置
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PluginConfig'
    patch:
      tags: [Settings]
      summary: 更新插件配置（启停/配置）
      parameters:
        - $ref: '#/components/parameters/PluginId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PluginConfig'
    delete:
      tags: [Settings]
      summary: 删除插件配置
      parameters:
        - $ref: '#/components/parameters/PluginId'
      responses:
        '204':
          description: 删除成功

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    NodeId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TaskId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RequestId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    JobId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ToolId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PluginId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ArticleId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
    ProbeNode:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        location:
          type: string
        network_type:
          type: string
          enum: [internal, external]
        supported_protocols:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [online, offline, maintenance]
        last_heartbeat_at:
          type: string
          format: date-time
    ProbeNodeCreate:
      type: object
      required: [name, location, network_type, supported_protocols]
      properties:
        name:
          type: string
        location:
          type: string
        network_type:
          type: string
          enum: [internal, external]
        supported_protocols:
          type: array
          items:
            type: string
    HeartbeatPayload:
      type: object
      required: [status, metrics]
      properties:
        status:
          type: string
          enum: [online, offline, maintenance]
        metrics:
          type: object
          additionalProperties:
            type: number
    OneOffDetectionRequest:
      type: object
      required: [target, protocol, probes]
      properties:
        target:
          type: string
        protocol:
          type: string
          enum: [HTTP, HTTPS, Telnet, WSS, Custom]
        probes:
          type: array
          items:
            type: string
            format: uuid
        options:
          type: object
    DetectionTask:
      type: object
      properties:
        id:
          type: string
          format: uuid
        target:
          type: string
        protocol:
          type: string
        probe_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [scheduled, running, succeeded, failed, timeout]
        response_time_ms:
          type: integer
        status_code:
          type: string
        certificate_expiry:
          type: string
          format: date
        log_trace:
          type: string
        executed_at:
          type: string
          format: date-time
    ProbeNodeSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        location:
          type: string
        network_type:
          type: string
        status:
          type: string
    MonitoringHistoryItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        target:
          type: string
        protocol:
          type: string
        status:
          type: string
        response_time_ms:
          type: integer
          nullable: true
        status_code:
          type: string
        executed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        probe:
          $ref: '#/components/schemas/ProbeNodeSummary'
      required: [id, target, protocol, status, created_at]
    MonitoringHistoryAggregates:
      type: object
      properties:
        total_count:
          type: integer
        status_counts:
          type: object
          additionalProperties:
            type: integer
        average_response_time_ms:
          type: number
          format: float
          nullable: true
        success_rate:
          type: number
          format: float
          nullable: true
    MonitoringHistoryPagination:
      type: object
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total_items:
          type: integer
