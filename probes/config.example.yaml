api_base_url: "https://oneall.example.com"
node_id: "probe-node-001"
api_token: "replace-with-api-token"
grpc_gateway: "oneall-gateway.example.com:5443"
grpc_insecure: true
grpc_ca_file: ""
grpc_client_cert: ""
grpc_client_key: ""
heartbeat_interval: 30
task_poll_interval: 15
request_timeout: 10
insecure_skip_tls: false
otlp_collector: ""
max_concurrent_tasks: 4
task_retry_limit: 2
metrics_addr: ":9100"
result_cache_path: "/var/lib/oneall-probe/cache/results.json"
result_cache_limit: 200
update_dir: "/var/lib/oneall-probe/updates"
schedule_store_path: "/var/lib/oneall-probe/state/schedules.json"
