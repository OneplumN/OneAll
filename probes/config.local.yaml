api_base_url: "http://127.0.0.1:8000"
grpc_gateway: "127.0.0.1:50051"
grpc_insecure: true

# 使用自动注册模式，bootstrap_token 需要和后端 settings 中的 PROBE_BOOTSTRAP_TOKEN 对齐
bootstrap_token: "oneall-bootstrap-dev"

location: "本机调试"
network_type: "internal"

heartbeat_interval: 30
task_poll_interval: 15
request_timeout: 10
insecure_skip_tls: false
max_concurrent_tasks: 1
task_retry_limit: 2

metrics_addr: ":9100"
result_cache_path: "/tmp/oneall-probe/cache/results.json"
result_cache_limit: 200
update_dir: "/tmp/oneall-probe/updates"
